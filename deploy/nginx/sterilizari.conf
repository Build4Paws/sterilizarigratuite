# nginx site config for sterilizarigratuite.ro — lives at
# /etc/nginx/conf.d/sterilizari.conf on the EC2 box.
#
# This is the source of truth; `deploy.sh` syncs it to the server, runs
# `nginx -t`, and reloads. Edit it here and redeploy — don't hand-edit the box.
#
# NOTE: the `listen 443 ssl` / `ssl_certificate*` lines are managed by Certbot.
# If you re-run certbot it may rewrite them; re-sync from the server afterwards
# (`sudo cat /etc/nginx/conf.d/sterilizari.conf`) so this file stays accurate.

server {
    server_name dev.sterilizarigratuite.ro;

    # Cloudflare Turnstile fires same-origin /cdn-cgi/challenge-platform/* beacons.
    # This origin isn't proxied through Cloudflare, so that reserved path doesn't
    # exist and Nuxt answers it with a 404 page. The beacons are best-effort
    # telemetry — the challenge itself runs in an iframe on challenges.cloudflare.com
    # and the token is issued regardless — so return an empty 204 to resolve them
    # quietly instead of polluting logs/monitoring with 404s.
    location /cdn-cgi/challenge-platform/ {
        return 204;
    }

    # Let Nuxt set CSP/HSTS/etc — nginx just proxies.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Cognito JWT cookies (admin auth) produce large Set-Cookie response
        # headers — the id/access/refresh tokens together blow past nginx's
        # default 8k proxy buffer, which surfaces as a 502 on a SUCCESSFUL
        # /api/admin/auth/login. These give the header block room to land.
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Hashed assets — long cache
    location /_nuxt/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 5m;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sterilizarigratuite.ro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sterilizarigratuite.ro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.sterilizarigratuite.ro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = sterilizarigratuite.ro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name sterilizarigratuite.ro www.sterilizarigratuite.ro;
    return 404; # managed by Certbot

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sterilizarigratuite.ro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sterilizarigratuite.ro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.sterilizarigratuite.ro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = sterilizarigratuite.ro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name sterilizarigratuite.ro www.sterilizarigratuite.ro;
    return 404; # managed by Certbot
}
